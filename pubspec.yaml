name: progetto_flutter
description: Un semplice progetto Flutter
publish_to: "none"
version: 1.1.36+40

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_lints: ^6.0.0
  dio: ^5.4.0
  provider: ^6.1.1
  shared_preferences: ^2.2.0
  path_provider: ^2.1.1
  intl: ^0.20.2
  file_picker: ^11.0.2
  url_launcher: ^6.3.2
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  package_info_plus: ^9.0.1
  flutter_local_notifications: ^20.1.0
  app_badge_plus: ^1.0.0
  permission_handler: ^12.0.3
  mobile_scanner: ^5.0.1
  flutter_pdfview: ^1.4.4
  signature: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon_square.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/logo.png
    - assets/icon/logo_orizzontale.png
    - assets/icon/app_icon_square.png
