name: Build & Release APK

on:
  push:
    tags:
      - 'v*.*.*'          # Triggera su tag tipo v1.0.0, v1.2.3
  workflow_dispatch:      # Permette lancio manuale dalla UI di GitHub

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout del codice ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Java 17 (richiesto da AGP 8.x) ───────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Setup Flutter (versione stabile) ───────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: 'stable'
          cache: true

      # ── 4. Ripristina google-services.json da secret ──────────────────────
      #    Nel tuo repo GitHub: Settings → Secrets → GOOGLE_SERVICES_JSON
      #    Valore: contenuto base64 del file google-services.json
      #    Comando per ottenerlo: base64 -w 0 android/app/google-services.json
      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json

      # ── 5. Ripristina il keystore da secret ───────────────────────────────
      #    Nel tuo repo GitHub: Settings → Secrets → KEYSTORE_BASE64
      #    Valore: contenuto base64 del file .jks
      #    Comando per ottenerlo: base64 -w 0 android/app/upload-keystore.jks
      - name: Restore keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      # ── 6. Crea key.properties dai secret ────────────────────────────────
      #    Secrets richiesti:
      #      KEY_ALIAS        → alias della chiave (es. "upload")
      #      KEY_PASSWORD     → password della chiave
      #      STORE_PASSWORD   → password del keystore
      - name: Create key.properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      # ── 7. Installa le dipendenze Flutter ────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 8. Build APK release ─────────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      # ── 9. Rinomina APK con versione del tag ─────────────────────────────
      - name: Rename APKs
        run: |
          VERSION=${GITHUB_REF_NAME:-manual}
          mkdir -p release-artifacts
          for apk in build/app/outputs/flutter-apk/app-*-release.apk; do
            filename=$(basename "$apk")
            cp "$apk" "release-artifacts/${filename%.apk}-${VERSION}.apk"
          done
          # Fallback: APK universale se non ci sono split
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            cp build/app/outputs/flutter-apk/app-release.apk \
               "release-artifacts/app-release-${VERSION}.apk"
          fi
          ls -lh release-artifacts/

      # ── 10. Upload artifact (sempre disponibile come download) ────────────
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.ref_name }}
          path: release-artifacts/*.apk
          retention-days: 30

      # ── 11. Crea GitHub Release (solo su tag v*) ─────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## 📱 Connexia Ristorazione ${{ github.ref_name }}

            ### Download
            Scarica l'APK per la tua architettura:
            - `arm64-v8a` → dispositivi moderni (64-bit) ✅ raccomandato
            - `armeabi-v7a` → dispositivi vecchi (32-bit)
            - `x86_64` → emulatori

            ### Installazione
            1. Abilita *"Installa da origini sconosciute"* nelle impostazioni Android
            2. Apri l'APK e installa

            ---
            *Build automatica via GitHub Actions*
          files: release-artifacts/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
