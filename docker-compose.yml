#version: "3.9"
name: progetto-flutter
services:
  # --- FLUTTER / DART (CLI + Web) ---
  flutter:
    image: ghcr.io/cirruslabs/flutter:3.24.0   # Flutter 3.24 (stabile)
    container_name: flutter-dev
    working_dir: /workspace
    volumes:
      - ./:/workspace          # monta tutto il progetto
    ports: 
      - "8090:8090"
      - "9090:9090"    # DevTools (opzionale)
    environment:
      - TZ=${TZ:-Europe/Rome}
    command: bash -lc "flutter run -d web-server --web-port=8090 --web-hostname=0.0.0.0"
    stdin_open: true
    tty: true
    restart: unless-stopped

  # --- BACKEND LARAVEL (PHP + BUILT-IN SERVER) ---
  laravel-backend:
    build:
      context: ./backend_app
      dockerfile: dockerfile
    container_name: laravel-backend
    working_dir: /var/www/html
    volumes:
      - ./backend_app:/var/www/html
    ports:
      - "8000:80"
    depends_on:
      - db
      - mongo
    environment:
      - TZ=Europe/Rome
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=base64:YOUR_APP_KEY
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${MYSQL_DATABASE:-appdb}
      - DB_USERNAME=${MYSQL_USER:-app}
      - DB_PASSWORD=${MYSQL_PASSWORD:-changemeApp!}
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
      - QUEUE_DRIVER=sync

  # --- BACKEND PHP + APACHE ---
  # php:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   image: progetto-flutter-php:8.2
  #   container_name: php-backend
  #   ports:
  #     - "${PHP_PORT:-8084}:80"            # http://localhost:8084
  #   volumes:
  #     - ./backend-php:/var/www/html       # codice PHP
  #     - ./apache/vhost.conf:/etc/apache2/sites-available/000-default.conf
  #   environment:
  #     - TZ=${TZ:-Europe/Rome}
  #     # Variabili utili per la tua app PHP
  #     - DB_HOST=db
  #     - DB_NAME=${MYSQL_DATABASE:-appdb}
  #     - DB_USER=${MYSQL_USER:-app}
  #     - DB_PASS=${MYSQL_PASSWORD:-changemeApp!}
  #   depends_on:
  #     - db
  #   restart: unless-stopped

  # --- APACHE STATIC WEB SERVER FOR FLUTTER BUILD ---
  apache-flutter:
    image: httpd:latest
    container_name: apache-flutter
    ports:
      - "8095:80"
    volumes:
      - C:/Users/phvas/www/Progetto-Flutter/build/web:/usr/local/apache2/htdocs/
    restart: unless-stopped

  # --- MySQL (OPZIONALE) ---
  db:
    image: mysql:8.0.39            # 8.0.x stabile (compatibile con pdo_mysql)
    container_name: db
    ports:
      - "${MYSQL_HOST_PORT:-3309}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-appdb}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set in .env}
      TZ: ${TZ:-Europe/Rome}
    volumes:
      - mysql_data:/var/lib/mysql
    # opzionale: file .sql iniziali
    # - ./mysql-init:/docker-entrypoint-initdb.d
    restart: unless-stopped

  # --- phpMyAdmin (OPZIONALE) ---
  phpmyadmin:
    image: phpmyadmin:5.2.1
    container_name: pma
    environment:
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - TZ=${TZ:-Europe/Rome}
    ports:
      - "${PMA_PORT:-8083}:80"           # http://localhost:8083
    depends_on:
      - db
    restart: unless-stopped

  # --- MongoDB (OPZIONALE) ---
  mongo:
    image: mongo:7.0
    container_name: mongo-db
    ports:
      - "${MONGO_HOST_PORT:-27018}:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: mongo-express
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - ME_CONFIG_BASICAUTH_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - TZ=${TZ:-Europe/Rome}
    ports:
      - "${MONGO_EXPRESS_PORT:-8085}:8081"
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mysql_data:
  mongo_data:
